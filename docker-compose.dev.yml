services:
  migrate:
    image: oven/bun:1.3.14
    working_dir: /app
    command: sh -lc "bun install && bun run db:generate && bunx prisma migrate deploy && bun run db:seed && bunx tsx scripts/verify-seed.ts"
    environment:
      DATABASE_URL: postgresql://malviz:malviz@postgres:5432/malviz?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - bun-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -lc "bun install && bun run db:generate && bun run dev -- -H 0.0.0.0 -p 3000"
    environment:
      DATABASE_URL: postgresql://malviz:malviz@postgres:5432/malviz?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      SESSION_COOKIE_NAME: malviz_session
      MAX_UPLOAD_BYTES: "26214400"
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bun-node-modules:/app/node_modules
      - next-cache:/app/.next
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    image: python:3.14-slim
    working_dir: /app
    command: sh -lc "pip install -r worker/python/requirements.txt && python worker/python/main.py"
    environment:
      DATABASE_URL: postgresql://malviz:malviz@postgres:5432/malviz?schema=public
      REDIS_URL: redis://redis:6379
      WORKER_POLL_SECONDS: "2"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  bun-node-modules:
  next-cache:
