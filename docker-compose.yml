services:
  postgres:
    image: postgres:17-alpine
    container_name: malviz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: malviz
      POSTGRES_USER: malviz
      POSTGRES_PASSWORD: malviz
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malviz -d malviz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: malviz-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
